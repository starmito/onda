# Override ROCm para Onda v3.1.1
# Añade los devices AMD ROCm (/dev/kfd, /dev/dri) necesarios para GPU
#
# Uso: docker compose -f docker-compose.yml -f docker-compose.rocm.yml up -d --build

services:
  onda:
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      # HSA_OVERRIDE_GFX_VERSION - necesario para AMD APU Radeon 780M/760M/740M (gfx1103).
      # Para activarlo, crea un archivo .env en el project root con:
      # HSA_OVERRIDE_GFX_VERSION=11.0.0
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
