worker_processes 1;
events { worker_connections 1024; }

pid /tmp/nginx.pid;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile off;
    tcp_nopush on;

    server {
        listen 3000;

        client_max_body_size 500m;

        # ── Output audio (streaming, CORS, MIME types) ──
        location /output/ {
            alias /output/;
            sendfile off;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
            types {
                audio/wav wav;
                audio/mpeg mp3;
                audio/flac flac;
                audio/ogg ogg opus;
            }
        }

        # ── Pitch input audio (uploaded via PitchPage) ──
        location /input_rubberband/ {
            alias /input_rubberband/;
            sendfile off;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
            types {
                audio/wav wav;
                audio/mpeg mp3;
                audio/flac flac;
                audio/ogg ogg opus;
            }
        }

        # ── Python API proxy ──
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Filename $http_x_filename;
            proxy_read_timeout 600s;
            add_header Cache-Control "no-cache";
        }

        # ── Legacy CGI redirect ──
        location /cgi-bin/ {
            rewrite ^/cgi-bin/(.*) /api/$1 break;
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Filename $http_x_filename;
            proxy_read_timeout 600s;
        }

        # ── v1 Legacy GUI ──
        location /v1/ {
            alias /usr/share/nginx/html/v1/;
            index index.html;
        }

        # ── v2 New GUI ──
        location /v2/ {
            alias /usr/share/nginx/html/v2/;
            index index.html;
        }

        # ── Root → tab switcher ──
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
