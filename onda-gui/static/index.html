<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onda — Audio Separator</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --dim: #888;
    --accent: #7c3aed;
    --accent-hover: #8b5cf6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  #tab-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    gap: 2px;
    padding: 6px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab-btn.active {
    color: var(--text);
    background: var(--bg);
    border-bottom-color: var(--bg);
    font-weight: 600;
  }
  #content {
    margin-top: 42px;
    height: calc(100vh - 42px);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  iframe.active { display: block; }
</style>
</head>
<body>
<div id="tab-bar">
  <button class="tab-btn active" data-tab="v2">🎛️ v2 Nueva</button>
  <button class="tab-btn" data-tab="v1">📦 v1 Legacy</button>
</div>
<div id="content">
  <iframe id="frame-v2" class="active" src="/v2/"></iframe>
  <iframe id="frame-v1" src="/v1/"></iframe>
</div>
<script>
  const tabs = document.querySelectorAll('.tab-btn');
  const frames = { v1: document.getElementById('frame-v1'), v2: document.getElementById('frame-v2') };

  function switchTab(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    Object.entries(frames).forEach(([k, f]) => f.classList.toggle('active', k === name));
    localStorage.setItem('onda-tab', name);
  }

  tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

  // Restore last tab
  const saved = localStorage.getItem('onda-tab') || 'v2';
  switchTab(saved);
</script>
</body>
</html>
