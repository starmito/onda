# Onda v3.1.1 — Contenedor unificado (Python + Go + Nginx + Svelte)
# GPU auto-detect en runtime. Perfiles/overrides para CUDA, ROCm, CPU.
#
# Uso:
#   docker compose up -d --build                      # CPU mode (default)
#   docker compose -f docker-compose.yml -f docker-compose.cuda.yml up -d --build   # CUDA
#   docker compose -f docker-compose.yml -f docker-compose.rocm.yml up -d --build   # ROCm
#
# O simplemente: bash deploy.sh   (detección automática)
#
# Variables de entorno (via .env):
#   ONDA_PORT    — puerto de la UI (default: 3000)
#   MODEL_DIR    — ruta local a los modelos (default: ./models)

services:
  onda:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${USER_UID:-1000}"
        USER_GID: "${USER_GID:-1000}"
    image: onda:3.1.1
    container_name: onda
    ports:
      - "${ONDA_PORT:-3000}:3000"
    volumes:
      - ${MODEL_DIR:-./models}:/app/models:rw
      - ./input:/input
      - ./output:/output
      - ./input_rubberband:/input_rubberband
      - ./daw-data:/daw-data
      - ./config:/config
      - pytorch-cache:/opt/pytorch-backends
    environment:
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - XDG_CACHE_HOME=/tmp/xdg_cache
      - HF_HOME=/tmp/hf_cache
    restart: unless-stopped

volumes:
  pytorch-cache:
