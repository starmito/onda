# Onda — Despliegue unificado (NVIDIA GPU)
# ── docker compose up -d --build ── levanta todo
#
# Configuración vía .env (crear desde .env.example):
#   MODEL_DIR    — ruta a los modelos (default: ./models)
#   HOST_UID     — UID del usuario host (default: 1000)
#   HOST_GID     — GID del usuario host (default: 1000)
#   ONDA_PORT    — puerto de la UI (default: 3000)

services:
  # ═══════════════════════════════════════════════════════════════
  #  onda — Contenedor de inferencia (Python + PyTorch + CUDA)
  # ═══════════════════════════════════════════════════════════════
  onda:
    image: onda:nvidia
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onda
    runtime: nvidia
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    group_add:
      - "983"  # docker group
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - TORCH_HOME=/tmp/torch_cache
      - XDG_CACHE_HOME=/tmp/xdg_cache
      - HF_HOME=/tmp/hf_cache
      - HOME=/tmp
      - TORCHINDUCTOR_CACHE_DIR=/tmp/torch_inductor_cache
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
      - ./input:/input
      - ./output:/output
      - ./input_rubberband:/input_rubberband
    working_dir: /app
    entrypoint: ["sh", "-c", "mkdir -p /tmp/numba_cache /tmp/torch_cache /tmp/xdg_cache /tmp/hf_cache /tmp/torch_inductor_cache && exec tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import torch; assert torch.cuda.is_available(), 'CUDA not available'"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  #  onda-gui — Frontend Svelte + Backend Go + Nginx
  # ═══════════════════════════════════════════════════════════════
  onda-gui:
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    group_add:
      - "983"  # docker group
    build:
      context: .
      dockerfile: ./onda-gui/Dockerfile
    image: onda-gui:latest
    container_name: onda-gui
    ports:
      - "${ONDA_PORT:-3000}:3000"
    depends_on:
      onda:
        condition: service_healthy
    volumes:
      - ${MODEL_DIR:-./models}:/models
      - ./input:/input
      - ./input_rubberband:/input_rubberband
      - ./output:/output
      - ./config:/config
      - /var/run/docker.sock:/var/run/docker.sock
