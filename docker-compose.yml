# Onda — Base compose (sin GPU)
# Override con docker-compose.nvidia.yml o docker-compose.amd.yml

services:
  # ── Backend: inferencia ──
  onda:
    image: onda:${GPU_TYPE:-nvidia}
    build:
      dockerfile: ${GPU_DOCKERFILE:-Dockerfile}
    container_name: onda
    volumes:
      - ./models:/app/models:ro
      - ./input:/input
      - ./output:/output
    working_dir: /app
    entrypoint: ["tail", "-f", "/dev/null"]

  # ── Frontend: nginx + CGI bash ──
  onda-gui:
    build: ./onda-gui
    image: onda-gui:latest
    container_name: onda-gui
    ports:
      - "3000:3000"
    depends_on:
      - onda
    volumes:
      - ./models:/models:ro
      - ./input:/input
      - ./output:/output
      - /var/run/docker.sock:/var/run/docker.sock
