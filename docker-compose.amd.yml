# Onda — AMD ROCm GPU override
# Usage: docker compose -f docker-compose.yml -f docker-compose.amd.yml up
#
# Requiere: ROCm instalado en el host

services:
  onda:
    build:
      dockerfile: Dockerfile.amd
    image: onda:amd
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
